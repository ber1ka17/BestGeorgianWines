<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Georgian Wines - Wine Details</title>
  <meta name="description" content="View wine details, choose quantity, and add to cart." />
  <meta name="keywords" content="wine detail, Best Georgian Wines, Georgian wine" />
  <meta name="author" content="Best Georgian Wines" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="cartSidebar" class="cart-sidebar" aria-label="Shopping cart sidebar">
    <div class="title">Cart <button style="float:right;border:none;background:transparent;font-size:1.1rem;cursor:pointer;" onclick="toggleCartSidebar()">×</button></div>
    <div id="sidebarCartContents"><p>Your cart is empty.</p></div>
    <div id="sidebarCartTotal"></div>
    <button class="btn btn-sm" onclick="clearCart()" style="margin-top:0.8rem;">Clear Cart</button>
  </div>
  <button class="cart-sidebar-toggle" onclick="toggleCartSidebar()">Cart <span id="cartBadge">0</span></button>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html"><img class="brand-logo" src="https://www.bgw.com.ge/images/logo1.png" alt="Best Georgian Wines logo" /> Best Georgian Wines</a>
      <nav class="main-nav" id="mainNavDetail" aria-label="Main site navigation">
        <a href="index.html">Home</a>
        <a href="wines.html">Wines</a>
        <a href="index.html#gallery">Gallery</a>
        <a href="index.html#about">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="section">
      <div class="container">
        <a href="wines.html" class="btn">Back to catalog</a>
        <div class="wine-detail" style="margin-top:1rem; gap:2rem;">
          <div>
            <img id="wineImage" src="" alt="Wine image" />
          </div>
          <div class="details">
            <h1 id="wineTitle">Wine Details</h1>
            <p id="wineType" style="font-weight:700; color:#8f3622;"></p>
            <p id="wineDescription"></p>
            <p id="winePrice" style="font-size:1.3rem; font-weight:800; margin-top:0.5rem;"></p>
            <label style="font-weight:600;">Quantity: <input type="number" id="wineQty" min="1" value="1" class="qty-input" style="margin-left:0.4rem; width: 75px;" /></label>
            <div style="margin-top:1rem;">
              <button id="wineAddButton" class="btn">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 Best Georgian Wines. All rights reserved.</p>
      <p><a href="index.html">Home</a> | <a href="wines.html">Wines</a></p>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
