<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Best Georgian Wines - Contact</title>
  <meta name="description" content="Contact Best Georgian Wines for orders, wholesale opportunities, and shipping information." />
  <meta name="keywords" content="Best Georgian Wines contact, wine orders, wholesale wine" />
  <meta name="author" content="Best Georgian Wines" />
  <meta property="og:title" content="Best Georgian Wines Contact" />
  <meta property="og:description" content="Send a message to Best Georgian Wines team via contact form." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://github.com/USERNAME/BGWines" />
  <meta property="og:image" content="https://www.bgw.com.ge/static/images/logo.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html"><img class="brand-logo" src="https://www.bgw.com.ge/images/logo1.png" alt="Best Georgian Wines logo" /> Best Georgian Wines</a>
      <button class="burger" id="burgerBtn3" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" id="mainNav3" aria-label="Main site navigation">
        <a href="index.html">Home</a>
        <a href="wines.html">Wines</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section" id="contact-section">
      <div class="container">
        <h2>Get In Touch</h2>
        <p>Contact Best Georgian Wines for ordering, tasting, or business inquiries.</p>
        <form id="contactForm" onsubmit="return handleFormSubmit(event)">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />

          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="+995 5xx xxxxx" pattern="[+0-9 ]{9,}" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>

          <button type="submit" class="btn">Send Message</button>
        </form>

        <div class="contact-info">
          <p><i class="fa-solid fa-location-dot"></i> Tbilisi, Georgia</p>
          <p><i class="fa-solid fa-phone"></i> +995 555 123 456</p>
          <p><i class="fa-solid fa-envelope"></i> info@bgwines.ge</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 Best Georgian Wines. All rights reserved.</p>
      <p><a href="index.html">Home</a> | <a href="wines.html">Wines</a></p>
    </div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
